<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PoE2 Atlas of Souls — Passive Tree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <style>
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-content: center;
        justify-items: center;
        gap: 18px;
        background: #07070a;
        color: #c8a35a;
        font-family: "Cinzel", serif;
        z-index: 100;
      }
      #boot .ring {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        border: 2px solid rgba(200, 163, 90, 0.24);
        border-top-color: #f1d6a0;
        animation: bootspin 1s linear infinite;
      }
      #boot .t {
        font-weight: 800;
        font-size: 22px;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: #f1d6a0;
        padding-left: 0.42em;
        text-shadow: 0 0 30px rgba(200, 163, 90, 0.4);
      }
      #boot .s {
        font-size: 11px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: #9c9279;
      }
      @keyframes bootspin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <div id="root">
      <div id="boot">
        <div class="ring"></div>
        <div class="t">Atlas of Souls</div>
        <div class="s">Loading passive tree…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
